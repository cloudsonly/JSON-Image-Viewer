<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON图片浏览器 - 现代版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        }
        
        :root {
            --primary-color: #4361ee;
            --primary-light: #e0e7ff;
            --primary-dark: #3a56d4;
            --secondary-color: #7209b7;
            --success-color: #2e7d32;
            --success-light: #edf7ed;
            --error-color: #e63946;
            --error-light: #fde8e8;
            --warning-color: #f8961e;
            --warning-light: #fff3cd;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #2d3748;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -1px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.08), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
            background-image: 
                radial-gradient(at 100% 0%, rgba(99, 102, 241, 0.05) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(139, 92, 246, 0.05) 0px, transparent 50%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
        }
        
        h1 {
            color: var(--primary-color);
            margin-bottom: 12px;
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.7;
        }
        
        .input-section {
            background-color: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 30px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 30px;
            border: 1px solid rgba(226, 232, 240, 0.6);
            transition: var(--transition);
        }
        
        .input-section:hover {
            box-shadow: var(--shadow-xl);
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        label {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        label:before {
            content: "🔗";
            font-size: 1rem;
        }
        
        .url-input-container {
            display: flex;
            gap: 12px;
        }
        
        .input-with-buttons {
            flex: 1;
            position: relative;
        }
        
        .url-input {
            width: 100%;
            padding: 16px 20px;
            padding-right: 100px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-lg);
            font-size: 1rem;
            transition: var(--transition);
            background-color: #f8fafc;
            color: var(--text-primary);
        }
        
        .url-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.15);
            background-color: white;
        }
        
        .input-buttons {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 6px;
        }
        
        .input-btn {
            background-color: var(--primary-light);
            color: var(--primary-color);
            border: 1px solid rgba(67, 97, 238, 0.2);
            border-radius: var(--radius-sm);
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .input-btn:hover {
            background-color: rgba(67, 97, 238, 0.1);
            transform: translateY(-1px);
        }
        
        .input-btn:active {
            transform: scale(0.97);
        }
        
        .input-btn.clear-btn {
            color: var(--error-color);
            background-color: rgba(230, 57, 70, 0.1);
            border-color: rgba(230, 57, 70, 0.2);
        }
        
        .input-btn.clear-btn:hover {
            background-color: rgba(230, 57, 70, 0.15);
        }
        
        .input-btn.paste-btn {
            color: var(--success-color);
            background-color: rgba(46, 125, 50, 0.1);
            border-color: rgba(46, 125, 50, 0.2);
        }
        
        .input-btn.paste-btn:hover {
            background-color: rgba(46, 125, 50, 0.15);
        }
        
        .load-btn {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
        }
        
        .load-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.4);
        }
        
        .load-btn:active {
            transform: scale(0.98);
        }
        
        .examples {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 10px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .example-link {
            color: var(--primary-color);
            text-decoration: none;
            cursor: pointer;
            padding: 6px 12px;
            background-color: var(--primary-light);
            border-radius: 20px;
            font-weight: 500;
            transition: var(--transition);
            border: 1px solid rgba(67, 97, 238, 0.2);
        }
        
        .example-link:hover {
            background-color: rgba(67, 97, 238, 0.15);
            transform: translateY(-1px);
        }
        
        .search-history-section {
            margin-top: 20px;
            padding: 20px;
            background-color: #f8fafc;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
        }
        
        .search-history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .search-history-title {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .search-history-title:before {
            content: "🕐";
            font-size: 1rem;
        }
        
        .clear-history-btn {
            background-color: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: var(--radius-sm);
            font-weight: 500;
            transition: var(--transition);
        }
        
        .clear-history-btn:hover {
            background-color: rgba(100, 116, 139, 0.1);
            color: var(--error-color);
        }
        
        .search-history-list {
            max-height: 200px;
            overflow-y: auto;
            overflow-x: hidden; /* 防止水平滚动条 */
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 8px;
            background-color: white;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            box-sizing: border-box;
        }
        
        .history-item:hover {
            background-color: var(--primary-light);
            border-color: rgba(67, 97, 238, 0.3);
            transform: translateX(4px);
        }
        
        .history-item-name {
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }
        
        .history-item-url {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-left: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
            flex-shrink: 0;
        }
        
        .history-item-remove {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 5px;
            margin-left: 10px;
            border-radius: 4px;
            transition: var(--transition);
            flex-shrink: 0;
        }
        
        .history-item-remove:hover {
            color: var(--error-color);
            background-color: rgba(230, 57, 70, 0.1);
        }
        
        .no-history {
            text-align: center;
            color: var(--text-muted);
            padding: 30px 20px;
            font-size: 0.9rem;
        }
        
        .status {
            margin-top: 15px;
            padding: 16px 20px;
            border-radius: var(--radius-md);
            display: none;
            font-weight: 500;
            border-left: 4px solid transparent;
        }
        
        .status.loading {
            background-color: var(--primary-light);
            color: var(--primary-color);
            border-left-color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status.loading:before {
            content: "⏳";
            font-size: 1.2rem;
            animation: spin 1s linear infinite;
        }
        
        .status.success {
            background-color: var(--success-light);
            color: var(--success-color);
            border-left-color: var(--success-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status.success:before {
            content: "✅";
            font-size: 1.2rem;
        }
        
        .status.error {
            background-color: var(--error-light);
            color: var(--error-color);
            border-left-color: var(--error-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status.error:before {
            content: "❌";
            font-size: 1.2rem;
        }
        
        .gallery-section {
            background-color: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 30px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(226, 232, 240, 0.6);
            transition: var(--transition);
        }
        
        .gallery-section:hover {
            box-shadow: var(--shadow-xl);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .section-title {
            font-size: 1.5rem;
            color: var(--text-primary);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title:before {
            content: "🖼️";
            font-size: 1.3rem;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .search-input {
            padding: 10px 16px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            transition: var(--transition);
            width: 250px;
            background-color: #f8fafc;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
            background-color: white;
        }
        
        .clear-search-btn {
            background-color: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .clear-search-btn:hover {
            background-color: rgba(100, 116, 139, 0.1);
        }
        
        .image-count {
            background-color: var(--primary-light);
            color: var(--primary-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }
        
        .image-card {
            background-color: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            position: relative;
        }
        
        .image-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-xl);
            border-color: rgba(67, 97, 238, 0.3);
        }
        
        .image-container {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            overflow: hidden;
            position: relative;
        }
        
        .image-container:after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 70%, rgba(0,0,0,0.05) 100%);
            pointer-events: none;
        }
        
        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.5s ease;
        }
        
        .image-card:hover .image-container img {
            transform: scale(1.05);
        }
        
        .image-info {
            padding: 20px;
        }
        
        .image-name {
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 1rem;
        }
        
        .image-url {
            font-size: 0.8rem;
            color: var(--text-secondary);
            word-break: break-all;
            max-height: 40px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            margin-bottom: 15px;
        }
        
        .image-actions {
            display: flex;
            gap: 10px;
        }
        
        .image-action-btn {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .image-action-btn.copy-btn {
            background-color: var(--primary-light);
            color: var(--primary-color);
        }
        
        .image-action-btn.copy-btn:hover {
            background-color: rgba(67, 97, 238, 0.2);
            transform: translateY(-2px);
        }
        
        .image-action-btn.copy-btn:active {
            transform: scale(0.95);
        }
        
        .image-action-btn.jump-btn {
            background-color: rgba(139, 92, 246, 0.1);
            color: #7209b7;
        }
        
        .image-action-btn.jump-btn:hover {
            background-color: rgba(139, 92, 246, 0.2);
            transform: translateY(-2px);
        }
        
        .image-action-btn.jump-btn:active {
            transform: scale(0.95);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }
        
        /* 浮动按钮容器 */
        .floating-buttons {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
        }
        
        /* 回到顶部按钮 */
        .back-to-top-btn {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
        }
        
        .back-to-top-btn.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .back-to-top-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.4);
        }
        
        .back-to-top-btn:active {
            transform: scale(0.95);
        }
        
        .back-to-top-btn i {
            font-size: 24px;
        }
        
        /* 搜索图片按钮 */
        .search-image-btn {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #7209b7 0%, #9d4edd 100%);
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(114, 9, 183, 0.3);
        }
        
        .search-image-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(114, 9, 183, 0.4);
        }
        
        .search-image-btn:active {
            transform: scale(0.95);
        }
        
        .search-image-btn i {
            font-size: 24px;
        }
        
        /* 搜索模态框 */
        .search-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }
        
        .search-modal.show {
            opacity: 1;
            visibility: visible;
        }
        
        .search-modal-content {
            background-color: white;
            border-radius: var(--radius-xl);
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow-xl);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        
        .search-modal.show .search-modal-content {
            transform: translateY(0);
        }
        
        .search-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .search-modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .search-modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        
        .search-modal-close:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }
        
        .search-modal-input {
            width: 100%;
            padding: 16px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 1rem;
            margin-bottom: 20px;
            transition: var(--transition);
        }
        
        .search-modal-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }
        
        .search-modal-info {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 15px;
            text-align: center;
        }
        
        footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
            
            .url-input-container {
                flex-direction: column;
            }
            
            .load-btn {
                width: 100%;
            }
            
            .history-item-url {
                max-width: 120px;
            }
            
            .input-buttons {
                right: 8px;
            }
            
            .input-btn {
                padding: 8px 12px;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .search-box {
                width: 100%;
            }
            
            .search-input {
                width: 100%;
            }
            
            .floating-buttons {
                bottom: 20px;
                right: 20px;
            }
            
            .back-to-top-btn,
            .search-image-btn {
                width: 50px;
                height: 50px;
            }
        }
        
        @media (max-width: 480px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            
            .container {
                padding: 0 10px;
            }
            
            .input-section, .gallery-section {
                padding: 20px 15px;
            }
            
            .history-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .history-item-url {
                margin-left: 0;
                max-width: 100%;
            }
            
            .input-btn span:last-child {
                display: none;
            }
            
            .image-actions {
                flex-direction: column;
                gap: 8px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .floating-buttons {
                bottom: 15px;
                right: 15px;
            }
            
            .back-to-top-btn,
            .search-image-btn {
                width: 48px;
                height: 48px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>JSON图片浏览器</h1>
            <p class="subtitle">输入JSON链接，自动加载并显示其中的图片，支持多种JSON格式。简洁高效，体验现代。</p>
        </header>
        
        <section class="input-section">
            <div class="input-group">
                <label for="json-url">JSON数据地址</label>
                <div class="url-input-container">
                    <div class="input-with-buttons">
                        <input type="text" id="json-url" class="url-input" placeholder="请输入包含图片信息的JSON链接" value="https://raw.githubusercontent.com/Wo254992/ko/refs/heads/main/emnyicon.json">
                        <div class="input-buttons">
                            <button class="input-btn paste-btn" id="paste-btn" title="粘贴地址">
                                <span>📋</span>
                                <span>粘贴</span>
                            </button>
                            <button class="input-btn clear-btn" id="clear-btn" title="清空地址">
                                <span>×</span>
                                <span>清空</span>
                            </button>
                        </div>
                    </div>
                    <button id="load-btn" class="load-btn">加载图片</button>
                </div>
                <div class="examples">
                    <span>示例链接：</span>
                    <a class="example-link" data-url="https://raw.githubusercontent.com/cc63/Fileball/main/icons.json">Fileball图标</a>
                    <a class="example-link" data-url="https://raw.githubusercontent.com/Wo254992/ko/refs/heads/main/emnyicon.json">Emny图标</a>
                </div>
                
                <div class="search-history-section">
                    <div class="search-history-header">
                        <div class="search-history-title">搜索历史</div>
                        <button class="clear-history-btn" id="clear-history-btn">清空历史</button>
                    </div>
                    <div id="search-history-list" class="search-history-list">
                        <!-- 历史记录会动态加载到这里 -->
                        <div class="no-history">暂无搜索历史</div>
                    </div>
                </div>
                
                <div id="status" class="status"></div>
            </div>
        </section>
        
        <section class="gallery-section">
            <div class="section-header">
                <h2 class="section-title">图片画廊</h2>
                <div class="search-box">
                    <input type="text" id="image-search-input" class="search-input" placeholder="搜索图片名称或地址...">
                    <button id="clear-search-btn" class="clear-search-btn">清空搜索</button>
                </div>
                <div class="image-count">共 <span id="count">0</span> 张图片</div>
            </div>
            
            <div id="gallery" class="gallery">
                <div class="empty-state">
                    <div class="empty-icon">🖼️</div>
                    <p>暂无图片，请输入JSON链接并点击"加载图片"</p>
                </div>
            </div>
        </section>
        
        <footer>
            <p>JSON图片浏览器 &copy; 2026 | 支持数组、对象等多种JSON格式 | 现代UI设计</p>
        </footer>
    </div>

    <!-- 搜索图片模态框 -->
    <div id="search-modal" class="search-modal">
        <div class="search-modal-content">
            <div class="search-modal-header">
                <h3 class="search-modal-title">搜索图片</h3>
                <button id="search-modal-close" class="search-modal-close">&times;</button>
            </div>
            <input type="text" id="search-modal-input" class="search-modal-input" placeholder="输入图片名称或地址关键词...">
            <p class="search-modal-info">按 Enter 键搜索，按 ESC 键关闭</p>
        </div>
    </div>

    <!-- 浮动按钮容器 -->
    <div class="floating-buttons">
        <button id="search-image-btn" class="search-image-btn" title="搜索图片">
            <i class="fas fa-search"></i>
        </button>
        <button id="back-to-top-btn" class="back-to-top-btn" title="回到顶部">
            <i class="fas fa-chevron-up"></i>
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const jsonUrlInput = document.getElementById('json-url');
            const loadBtn = document.getElementById('load-btn');
            const clearBtn = document.getElementById('clear-btn');
            const pasteBtn = document.getElementById('paste-btn');
            const gallery = document.getElementById('gallery');
            const statusDiv = document.getElementById('status');
            const countSpan = document.getElementById('count');
            const exampleLinks = document.querySelectorAll('.example-link');
            const searchHistoryList = document.getElementById('search-history-list');
            const clearHistoryBtn = document.getElementById('clear-history-btn');
            const imageSearchInput = document.getElementById('image-search-input');
            const clearSearchBtn = document.getElementById('clear-search-btn');
            const backToTopBtn = document.getElementById('back-to-top-btn');
            const searchImageBtn = document.getElementById('search-image-btn');
            const searchModal = document.getElementById('search-modal');
            const searchModalInput = document.getElementById('search-modal-input');
            const searchModalClose = document.getElementById('search-modal-close');
            
            // 搜索历史管理
            const HISTORY_KEY = 'json_image_viewer_history';
            const MAX_HISTORY_ITEMS = 20;
            
            // 存储当前图片数据
            let currentImages = [];
            
            // 清空输入框按钮事件
            clearBtn.addEventListener('click', function() {
                jsonUrlInput.value = '';
                jsonUrlInput.focus();
                showStatus('输入框已清空', 'success');
            });
            
            // 粘贴按钮事件
            pasteBtn.addEventListener('click', function() {
                if (navigator.clipboard && navigator.clipboard.readText) {
                    navigator.clipboard.readText()
                        .then(text => {
                            if (text) {
                                jsonUrlInput.value = text;
                                showStatus('地址已从剪贴板粘贴', 'success');
                            } else {
                                showStatus('剪贴板中没有内容', 'error');
                            }
                        })
                        .catch(err => {
                            console.error('无法读取剪贴板: ', err);
                            showStatus('无法访问剪贴板，请手动粘贴', 'error');
                        });
                } else {
                    // 回退方案：使用 document.execCommand
                    jsonUrlInput.focus();
                    try {
                        const success = document.execCommand('paste');
                        if (success) {
                            showStatus('地址已从剪贴板粘贴', 'success');
                        } else {
                            showStatus('请使用Ctrl+V手动粘贴', 'error');
                        }
                    } catch (err) {
                        console.error('execCommand失败: ', err);
                        showStatus('请使用Ctrl+V手动粘贴', 'error');
                    }
                }
            });
            
            // 加载搜索历史
            function loadSearchHistory() {
                const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
                return history;
            }
            
            // 保存搜索历史
            function saveSearchHistory(history) {
                localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            }
            
            // 添加搜索历史（修改：点击历史记录时不重新排序）
            function addToSearchHistory(url, name, isFromHistoryClick = false) {
                let history = loadSearchHistory();
                
                // 检查是否已存在相同的URL
                const existingIndex = history.findIndex(item => item.url === url);
                
                if (existingIndex !== -1) {
                    // 如果已存在，更新名称和时间戳
                    history[existingIndex].name = name;
                    history[existingIndex].timestamp = new Date().toISOString();
                    
                    // 只有当不是从历史记录点击时，才移到最前面
                    if (!isFromHistoryClick) {
                        const item = history.splice(existingIndex, 1)[0];
                        history.unshift(item);
                    }
                } else {
                    // 如果不存在，添加到最前面
                    history.unshift({
                        url: url,
                        name: name,
                        timestamp: new Date().toISOString()
                    });
                    
                    // 限制历史记录数量
                    if (history.length > MAX_HISTORY_ITEMS) {
                        history = history.slice(0, MAX_HISTORY_ITEMS);
                    }
                }
                
                saveSearchHistory(history);
                renderSearchHistory();
            }
            
            // 从搜索历史中移除一项
            function removeFromSearchHistory(url) {
                let history = loadSearchHistory();
                history = history.filter(item => item.url !== url);
                saveSearchHistory(history);
                renderSearchHistory();
            }
            
            // 清空搜索历史
            function clearSearchHistory() {
                if (confirm('确定要清空所有搜索历史吗？')) {
                    localStorage.removeItem(HISTORY_KEY);
                    renderSearchHistory();
                }
            }
            
            // 渲染搜索历史
            function renderSearchHistory() {
                const history = loadSearchHistory();
                
                if (history.length === 0) {
                    searchHistoryList.innerHTML = '<div class="no-history">暂无搜索历史</div>';
                    return;
                }
                
                let historyHTML = '';
                
                history.forEach(item => {
                    const displayName = item.name || '未命名';
                    const shortUrl = item.url.length > 50 ? item.url.substring(0, 47) + '...' : item.url;
                    
                    historyHTML += `
                        <div class="history-item" data-url="${item.url}">
                            <div class="history-item-name" title="${displayName}">${displayName}</div>
                            <div class="history-item-url" title="${item.url}">${shortUrl}</div>
                            <button class="history-item-remove" title="删除此项">×</button>
                        </div>
                    `;
                });
                
                searchHistoryList.innerHTML = historyHTML;
                
                // 为历史项添加点击事件
                document.querySelectorAll('.history-item').forEach(item => {
                    const url = item.getAttribute('data-url');
                    const name = item.querySelector('.history-item-name').textContent;
                    
                    // 点击历史项（除了删除按钮）加载对应的URL
                    item.addEventListener('click', function(e) {
                        if (!e.target.classList.contains('history-item-remove')) {
                            jsonUrlInput.value = url;
                            // 传递标志，表示这是从历史记录点击的，不重新排序
                            loadImages(url, true, name);
                        }
                    });
                    
                    // 删除按钮事件
                    const removeBtn = item.querySelector('.history-item-remove');
                    if (removeBtn) {
                        removeBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            removeFromSearchHistory(url);
                        });
                    }
                });
            }
            
            // 清空历史按钮事件
            clearHistoryBtn.addEventListener('click', clearSearchHistory);
            
            // 示例链接点击事件
            exampleLinks.forEach(link => {
                link.addEventListener('click', function() {
                    const url = this.getAttribute('data-url');
                    jsonUrlInput.value = url;
                    loadImages(url);
                });
            });
            
            // 加载按钮点击事件
            loadBtn.addEventListener('click', function() {
                const url = jsonUrlInput.value.trim();
                if (!url) {
                    showStatus('请输入有效的JSON链接', 'error');
                    return;
                }
                
                loadImages(url);
            });
            
            // 按Enter键也可以触发加载
            jsonUrlInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    loadBtn.click();
                }
            });
            
            // 图片搜索功能
            imageSearchInput.addEventListener('input', function() {
                filterImages(this.value.trim());
            });
            
            clearSearchBtn.addEventListener('click', function() {
                imageSearchInput.value = '';
                filterImages('');
            });
            
            // 搜索图片函数
            function filterImages(searchTerm) {
                if (!currentImages || currentImages.length === 0) return;
                
                const searchLower = searchTerm.toLowerCase();
                let visibleCount = 0;
                
                // 获取所有图片卡片
                const imageCards = document.querySelectorAll('.image-card');
                
                imageCards.forEach(card => {
                    const nameElement = card.querySelector('.image-name');
                    const urlElement = card.querySelector('.image-url');
                    
                    if (!nameElement || !urlElement) return;
                    
                    const name = nameElement.textContent.toLowerCase();
                    const url = urlElement.textContent.toLowerCase();
                    
                    // 检查是否匹配搜索词
                    const isMatch = name.includes(searchLower) || url.includes(searchLower);
                    
                    if (isMatch || searchTerm === '') {
                        card.style.display = 'block';
                        visibleCount++;
                    } else {
                        card.style.display = 'none';
                    }
                });
                
                // 更新显示数量
                if (searchTerm) {
                    countSpan.textContent = visibleCount;
                    showStatus(`找到 ${visibleCount} 张匹配的图片`, 'success');
                } else {
                    countSpan.textContent = currentImages.length;
                }
            }
            
            // 回到顶部功能
            window.addEventListener('scroll', function() {
                if (window.pageYOffset > 300) {
                    backToTopBtn.classList.add('show');
                } else {
                    backToTopBtn.classList.remove('show');
                }
            });
            
            backToTopBtn.addEventListener('click', function() {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
            
            // 搜索图片模态框功能
            searchImageBtn.addEventListener('click', function() {
                searchModal.classList.add('show');
                searchModalInput.focus();
            });
            
            searchModalClose.addEventListener('click', function() {
                searchModal.classList.remove('show');
            });
            
            searchModal.addEventListener('click', function(e) {
                if (e.target === searchModal) {
                    searchModal.classList.remove('show');
                }
            });
            
            // 模态框内搜索功能
            searchModalInput.addEventListener('input', function() {
                filterImages(this.value.trim());
            });
            
            // 按ESC键关闭模态框
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && searchModal.classList.contains('show')) {
                    searchModal.classList.remove('show');
                }
                
                // 在模态框内按Enter键搜索
                if (e.key === 'Enter' && searchModal.classList.contains('show') && document.activeElement === searchModalInput) {
                    const searchTerm = searchModalInput.value.trim();
                    filterImages(searchTerm);
                    if (searchTerm) {
                        showStatus(`搜索完成，找到 ${document.querySelectorAll('.image-card[style*="display: block"]').length} 张图片`, 'success');
                    }
                }
            });
            
            // 点击搜索图片按钮后，如果已经有搜索词，则应用到模态框
            searchImageBtn.addEventListener('click', function() {
                const currentSearch = imageSearchInput.value.trim();
                if (currentSearch) {
                    searchModalInput.value = currentSearch;
                }
            });
            
            // 页面加载后自动加载默认链接
            loadImages(jsonUrlInput.value);
            
            // 页面加载后渲染搜索历史
            renderSearchHistory();
            
            // 加载图片函数（增加isFromHistoryClick参数）
            async function loadImages(url, isFromHistoryClick = false, historyName = '') {
                showStatus('正在加载JSON数据...', 'loading');
                clearGallery();
                
                try {
                    const response = await fetch(url);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP错误: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    
                    // 获取图片数组
                    const imageArray = getImageArray(data);
                    
                    if (!imageArray || !Array.isArray(imageArray)) {
                        throw new Error('无法从JSON中找到图片数组。请检查JSON格式。');
                    }
                    
                    if (imageArray.length === 0) {
                        showStatus('JSON中未找到图片数据', 'error');
                        return;
                    }
                    
                    // 保存当前图片数据
                    currentImages = imageArray;
                    
                    // 处理并显示图片
                    displayImages(imageArray);
                    showStatus(`成功加载 ${imageArray.length} 张图片`, 'success');
                    
                    // 清空搜索框
                    imageSearchInput.value = '';
                    searchModalInput.value = '';
                    
                    // 尝试从JSON数据中提取名称
                    const jsonName = extractJsonName(data, url);
                    
                    // 添加到搜索历史，传递是否来自历史记录点击的标志
                    addToSearchHistory(url, isFromHistoryClick ? historyName : jsonName, isFromHistoryClick);
                    
                } catch (error) {
                    console.error('加载失败:', error);
                    showStatus(`加载失败: ${error.message}`, 'error');
                    
                    // 显示空状态
                    gallery.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">⚠️</div>
                            <p>加载失败: ${error.message}</p>
                            <p style="margin-top: 10px; font-size: 0.9rem;">请检查JSON链接是否正确且支持跨域访问</p>
                            <p style="margin-top: 5px; font-size: 0.9rem;">支持的JSON格式：包含图片URL的数组，或包含图片数组的对象</p>
                        </div>
                    `;
                    countSpan.textContent = '0';
                }
            }
            
            // 从JSON数据中提取名称
            function extractJsonName(data, url) {
                // 首先尝试从JSON的顶层获取name字段
                if (data && typeof data === 'object') {
                    if (data.name) {
                        return data.name;
                    }
                    
                    // 尝试其他可能的名称字段
                    const possibleNameFields = ['title', 'filename', 'label', 'displayName', 'collectionName'];
                    for (const field of possibleNameFields) {
                        if (data[field]) {
                            return data[field];
                        }
                    }
                }
                
                // 如果JSON中没有名称，尝试从URL中提取
                try {
                    const urlObj = new URL(url);
                    const pathParts = urlObj.pathname.split('/');
                    const filename = pathParts[pathParts.length - 1];
                    
                    // 去除文件扩展名
                    if (filename.includes('.')) {
                        return filename.substring(0, filename.lastIndexOf('.'));
                    }
                    
                    return filename || '未命名';
                } catch (e) {
                    return '未命名';
                }
            }
            
            // 从JSON数据中获取图片数组
            function getImageArray(data) {
                // 如果数据本身就是数组
                if (Array.isArray(data)) {
                    return data;
                }
                
                // 如果是对象，尝试查找包含数组的属性
                if (typeof data === 'object' && data !== null) {
                    // 常见的关键字
                    const commonKeys = ['images', 'icons', 'data', 'items', 'list', 'results', 'photos'];
                    
                    for (const key of commonKeys) {
                        if (data[key] && Array.isArray(data[key])) {
                            return data[key];
                        }
                    }
                    
                    // 查找所有数组类型的属性
                    for (const key in data) {
                        if (Array.isArray(data[key])) {
                            return data[key];
                        }
                    }
                }
                
                return null;
            }
            
            // 显示图片函数
            function displayImages(images) {
                clearGallery();
                
                if (images.length === 0) {
                    gallery.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">🖼️</div>
                            <p>JSON中没有找到图片数据</p>
                            <p style="margin-top: 10px; font-size: 0.9rem;">请确保JSON包含有效的图片URL字段</p>
                        </div>
                    `;
                    countSpan.textContent = '0';
                    return;
                }
                
                let validImageCount = 0;
                
                images.forEach((item, index) => {
                    // 尝试从不同字段获取URL和名称
                    const imageUrl = item.url || item.imageUrl || item.src || item.image || item.icon || item.thumbnail || item.preview || '';
                    const imageName = item.name || item.title || item.filename || item.label || `图片 ${index + 1}`;
                    
                    if (!imageUrl) {
                        console.warn(`第 ${index + 1} 个元素没有找到有效的图片URL`, item);
                        return;
                    }
                    
                    const imageCard = document.createElement('div');
                    imageCard.className = 'image-card';
                    
                    // 创建图片容器
                    const imageContainer = document.createElement('div');
                    imageContainer.className = 'image-container';
                    
                    const img = document.createElement('img');
                    img.src = imageUrl;
                    img.alt = imageName;
                    img.loading = 'lazy';
                    
                    // 使用事件监听器处理图片加载错误
                    img.addEventListener('error', function() {
                        // 图片加载失败时，使用一个简单的SVG作为占位符
                        const svgData = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="#f1f5f9"/></svg>';
                        img.src = svgData;
                    });
                    
                    imageContainer.appendChild(img);
                    
                    // 创建图片信息区域
                    const imageInfo = document.createElement('div');
                    imageInfo.className = 'image-info';
                    
                    // 图片名称
                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'image-name';
                    nameDiv.title = imageName;
                    nameDiv.textContent = imageName;
                    
                    // 图片URL
                    const urlDiv = document.createElement('div');
                    urlDiv.className = 'image-url';
                    urlDiv.title = imageUrl;
                    urlDiv.textContent = imageUrl;
                    
                    // 创建操作按钮区域
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'image-actions';
                    
                    // 复制按钮（去除emoji）
                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'image-action-btn copy-btn';
                    copyBtn.textContent = '复制';
                    copyBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        copyToClipboard(imageUrl);
                    });
                    
                    // 跳转按钮（去除emoji）
                    const jumpBtn = document.createElement('button');
                    jumpBtn.className = 'image-action-btn jump-btn';
                    jumpBtn.textContent = '跳转';
                    jumpBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        window.open(imageUrl, '_blank');
                    });
                    
                    // 将按钮添加到操作区域
                    actionsDiv.appendChild(copyBtn);
                    actionsDiv.appendChild(jumpBtn);
                    
                    // 将元素添加到图片信息区域
                    imageInfo.appendChild(nameDiv);
                    imageInfo.appendChild(urlDiv);
                    imageInfo.appendChild(actionsDiv);
                    
                    // 将图片容器和信息区域添加到卡片
                    imageCard.appendChild(imageContainer);
                    imageCard.appendChild(imageInfo);
                    
                    // 将卡片添加到画廊
                    gallery.appendChild(imageCard);
                    validImageCount++;
                });
                
                countSpan.textContent = validImageCount;
                
                if (validImageCount === 0) {
                    gallery.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">🖼️</div>
                            <p>未找到有效的图片数据</p>
                            <p style="margin-top: 10px; font-size: 0.9rem;">JSON中没有包含有效图片URL的数据</p>
                        </div>
                    `;
                }
            }
            
            // 复制到剪贴板函数
            function copyToClipboard(text) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text)
                        .then(() => {
                            showStatus('地址已复制到剪贴板', 'success');
                        })
                        .catch(err => {
                            console.error('复制失败: ', err);
                            // 回退方案
                            fallbackCopyToClipboard(text);
                        });
                } else {
                    // 回退方案
                    fallbackCopyToClipboard(text);
                }
            }
            
            // 回退复制方案
            function fallbackCopyToClipboard(text) {
                const textArea = document.createElement('textarea');
                textArea.value = text;
                textArea.style.position = 'fixed';
                textArea.style.left = '-999999px';
                textArea.style.top = '-999999px';
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                
                try {
                    const successful = document.execCommand('copy');
                    if (successful) {
                        showStatus('地址已复制到剪贴板', 'success');
                    } else {
                        showStatus('复制失败，请手动复制', 'error');
                    }
                } catch (err) {
                    console.error('回退复制失败: ', err);
                    showStatus('复制失败，请手动复制', 'error');
                }
                
                document.body.removeChild(textArea);
            }
            
            // 清空画廊函数
            function clearGallery() {
                gallery.innerHTML = '';
            }
            
            // 显示状态函数
            function showStatus(message, type) {
                statusDiv.textContent = message;
                statusDiv.className = `status ${type}`;
                
                // 3秒后自动隐藏成功/错误消息（不隐藏加载状态）
                if (type !== 'loading') {
                    setTimeout(() => {
                        statusDiv.style.display = 'none';
                    }, 3000);
                }
            }
        });
    </script>
</body>
</html>
